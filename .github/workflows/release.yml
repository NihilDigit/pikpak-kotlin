name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Philosophy: CI here is purely a release gate, not a per-commit quality check.
# Dev-time testing happens locally; this workflow's job is to make sure every
# target we ship actually runs (or at least compiles) on a real machine of the
# right OS/arch BEFORE the artifact goes to Maven Central. Publish is gated on
# every matrix cell passing.
#
# Runtime-test vs compile-only follows Kotlin/Native's own target tier table
# (see https://kotlinlang.org/docs/native-target-support.html). Targets whose
# "Running Tests" column is ✅ upstream get a *Test task here; the rest only
# need compileKotlin<Target> to catch config regressions.
jobs:
  test:
    name: Test ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Runtime-tested (matches Kotlin/Native Tier 1/2 "Running Tests ✅")
          - { name: jvm,               runner: ubuntu-latest, task: jvmTest }
          - { name: linuxX64,          runner: ubuntu-latest, task: linuxX64Test }
          - { name: macosArm64,        runner: macos-latest,  task: macosArm64Test }
          - { name: iosSimulatorArm64, runner: macos-latest,  task: iosSimulatorArm64Test }

          # Compile-only (target shipped but upstream doesn't run tests either)
          - { name: linuxArm64,        runner: ubuntu-latest, task: compileKotlinLinuxArm64 }
          - { name: mingwX64,          runner: ubuntu-latest, task: compileKotlinMingwX64 }
          - { name: iosArm64,          runner: macos-latest,  task: compileKotlinIosArm64 }
          - { name: iosX64,            runner: macos-latest,  task: compileKotlinIosX64 }
          # Android artefact is JVM bytecode; full instrumented tests belong in
          # a consumer app. A clean AAR assembly catches config regressions.
          - { name: android,           runner: ubuntu-latest, task: ':assembleAndroidMain', setup_android: true }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - if: matrix.setup_android
        uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew ${{ matrix.task }}

  publish:
    name: Publish to Maven Central
    # macOS runner so iOS/macOS targets can compile alongside JVM and Linux/Windows.
    runs-on: macos-latest
    needs: [test]
    # `contents: write` is what `gh release create` needs to publish the
    # auto-generated GitHub Release after Maven Central accepts the artifact.
    # Default GITHUB_TOKEN is read-only, hence the explicit grant.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches build.gradle.kts version
        run: |
          TAG=${GITHUB_REF_NAME#v}
          VERSION=$(grep -E '^version\s*=\s*"' build.gradle.kts | head -1 | sed -E 's/.*"(.+)".*/\1/')
          echo "tag=$TAG  version=$VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match build.gradle.kts version $VERSION — bump and re-tag"
            exit 1
          fi
          if [[ "$VERSION" == *"-SNAPSHOT" ]]; then
            echo "::error::Refusing to release a SNAPSHOT version ($VERSION) — drop the -SNAPSHOT suffix"
            exit 1
          fi

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      # Publish the GitHub Release only after Maven Central has accepted the
      # artifact, so a git tag with no corresponding release page is proof
      # the publish step failed. Notes are auto-generated from commits +
      # merged PRs since the previous tag.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --latest
