name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Philosophy: CI here is purely a release gate, not a per-commit quality check.
# Dev-time testing happens locally; this workflow's job is to make sure every
# target we ship actually runs on a real machine of the right OS/arch BEFORE
# the artifact goes to Maven Central. Publish is gated on all runtime tests.
jobs:
  test-linux:
    name: Test jvm + linuxX64 runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew jvmTest linuxX64Test

  test-macos:
    name: Test macosArm64 runtime + iOS compile
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: |
          ./gradlew macosArm64Test \
                    compileKotlinIosX64 \
                    compileKotlinIosArm64 \
                    compileKotlinIosSimulatorArm64

  test-windows:
    name: Test mingwX64 runtime
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew mingwX64Test

  publish:
    name: Publish to Maven Central
    # macOS runner so iOS/macOS targets can compile alongside JVM and Linux/Windows.
    runs-on: macos-latest
    needs: [test-linux, test-macos, test-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches build.gradle.kts version
        run: |
          TAG=${GITHUB_REF_NAME#v}
          VERSION=$(grep -E '^version\s*=\s*"' build.gradle.kts | head -1 | sed -E 's/.*"(.+)".*/\1/')
          echo "tag=$TAG  version=$VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match build.gradle.kts version $VERSION — bump and re-tag"
            exit 1
          fi
          if [[ "$VERSION" == *"-SNAPSHOT" ]]; then
            echo "::error::Refusing to release a SNAPSHOT version ($VERSION) — drop the -SNAPSHOT suffix"
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      # Publish the GitHub Release only after Maven Central has accepted the
      # artifact, so a git tag with no corresponding release page is proof
      # the publish step failed. Notes are auto-generated from commits +
      # merged PRs since the previous tag.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --latest
