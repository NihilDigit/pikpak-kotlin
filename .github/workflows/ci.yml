name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Parallel matrix of real runtime tests per platform. Kotlin/Native produces
# platform-specific binaries, so the only honest way to cover all our targets
# is to let each one run on its own OS. jvmTest is covered by the linux-x64
# job to keep the matrix lean; iOS gets compile-only verification because
# running simulator tests in CI is slow without adding signal.
jobs:
  linux-x64:
    name: linux x64 (jvm + native runtime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew jvmTest linuxX64Test

  macos-arm64:
    name: macos arm64 (native runtime + all iOS compile)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: |
          ./gradlew macosArm64Test \
                    compileKotlinIosX64 \
                    compileKotlinIosArm64 \
                    compileKotlinIosSimulatorArm64

  windows-x64:
    name: windows x64 (native runtime)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew mingwX64Test
